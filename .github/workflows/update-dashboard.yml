name: Update TKO Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python for Whisper
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install whisper + ffmpeg
        run: |
          python -m pip install --upgrade pip
          pip install openai-whisper
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate dashboard JSON from TKO RSS + intelligence
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          WHISPER_MODEL: tiny.en
          TKO_INTEL_MAX_EPISODES: 2
        run: node scripts/generate-tko-data.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tko-intel.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: refresh TKO feed with business intelligence"
          git push
