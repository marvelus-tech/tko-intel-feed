name: Update TKO Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout workspace-data repo for source files
        uses: actions/checkout@v4
        with:
          repository: marvelus-tech/workspace-data
          path: workspace-data

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync scout/report data into temp paths
        run: |
          mkdir -p ../memory/scout-findings ../reports/solana-scout
          cp -R workspace-data/memory/scout-findings/. ../memory/scout-findings/ || true
          cp -R workspace-data/reports/solana-scout/. ../reports/solana-scout/ || true

      - name: Generate dashboard JSON
        run: node scripts/generate-tko-data.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tko-intel.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: refresh tko intel data"
          git push
