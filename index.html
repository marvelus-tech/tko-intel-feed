<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TKO Intel Feed</title>
  <meta name="description" content="The Koerner Office episode feed with searchable playback." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #06070b;
      --bg-2: #0b0f18;
      --card: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.12);
      --text: #f7f8fc;
      --muted: #a6aec3;
      --accent: #77a9ff;
      --accent-soft: rgba(119,169,255,0.18);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% -10%, #1f2d4f 0%, transparent 34%),
        radial-gradient(circle at 90% -20%, #1c2136 0%, transparent 40%),
        var(--bg);
    }

    .app { max-width: 1050px; margin: 0 auto; padding: 22px 14px 44px; }
    .glass {
      background: linear-gradient(140deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 20px 55px rgba(0,0,0,0.35);
    }

    .hero { padding: 20px; margin-bottom: 14px; }
    .kicker { color: #9dd3ff; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; font-weight: 700; }
    h1 { margin: 10px 0 6px; font-size: clamp(30px, 5.5vw, 48px); line-height: 1.02; letter-spacing: -.03em; }
    .sub { margin: 0; color: var(--muted); font-size: 14px; }

    .controls { display: grid; gap: 10px; padding: 14px; margin-bottom: 14px; }
    .search {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 13px 14px;
      font-size: 14px;
      color: var(--text);
      background: rgba(9, 13, 22, 0.9);
      outline: none;
    }
    .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; }
    .meta { color: var(--muted); font-size: 12px; }

    .list { display: grid; gap: 12px; }
    .episode { padding: 14px; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .badge {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      color: #c5d3ff;
      font-weight: 600;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .date { color: var(--muted); font-size: 12px; }
    .title { margin: 0 0 8px; font-size: 19px; line-height: 1.25; letter-spacing: -.01em; }
    .desc { margin: 0 0 10px; color: var(--muted); font-size: 14px; line-height: 1.45; }
    audio { width: 100%; height: 36px; border-radius: 10px; }

    .empty { padding: 20px; text-align: center; color: var(--muted); }
    .footer { margin-top: 16px; text-align: center; color: var(--muted); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }

    @media (min-width: 900px) {
      .app { padding-top: 30px; }
      .hero { padding: 24px; }
      .controls { padding: 16px; }
      .episode { padding: 16px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero glass">
      <div class="kicker">The Koerner Office</div>
      <h1>TKO Intel Feed</h1>
      <p class="sub">Weekly business opportunities, AI plays, and service business ideas — in one premium episode stream.</p>
    </section>

    <section class="controls glass">
      <input id="search" class="search" type="search" placeholder="Search episodes, topics, opportunities..." autocomplete="off" />
      <div class="meta-row">
        <div class="meta" id="feedMeta">Loading feed…</div>
        <div class="meta" id="countMeta"></div>
      </div>
    </section>

    <section class="list" id="episodes"></section>
    <div class="footer" id="updated">Last updated —</div>
  </main>

  <script>
    const elEpisodes = document.getElementById('episodes');
    const elSearch = document.getElementById('search');
    const elFeedMeta = document.getElementById('feedMeta');
    const elCountMeta = document.getElementById('countMeta');
    const elUpdated = document.getElementById('updated');

    let allEpisodes = [];

    const fmtDate = (value) => {
      if (!value) return 'Date unavailable';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    };

    const render = (episodes) => {
      elCountMeta.textContent = `${episodes.length} episode${episodes.length === 1 ? '' : 's'}`;

      if (!episodes.length) {
        elEpisodes.innerHTML = '<article class="glass empty">No episodes matched your search.</article>';
        return;
      }

      elEpisodes.innerHTML = episodes.map((ep) => {
        const badge = ep.episodeNumber ? `Episode ${ep.episodeNumber}` : 'TKO Episode';
        const desc = ep.descriptionExcerpt || ep.description || 'No description available.';
        return `
          <article class="episode glass">
            <div class="top">
              <div class="badge">${badge}</div>
              <div class="date">${fmtDate(ep.publishedAt || ep.publishDate)}</div>
            </div>
            <h2 class="title">${ep.title || 'Untitled Episode'}</h2>
            <p class="desc">${desc}</p>
            <audio controls preload="none" src="${ep.audioUrl}"></audio>
          </article>
        `;
      }).join('');
    };

    const applyFilter = () => {
      const q = elSearch.value.trim().toLowerCase();
      if (!q) {
        render(allEpisodes);
        return;
      }

      const filtered = allEpisodes.filter((ep) => {
        const hay = `${ep.title || ''} ${ep.description || ''} ${ep.descriptionExcerpt || ''}`.toLowerCase();
        return hay.includes(q);
      });

      render(filtered);
    };

    async function init() {
      const res = await fetch('./data/tko-intel.json', { cache: 'no-store' });
      const data = await res.json();

      allEpisodes = (data.episodes || [])
        .slice()
        .sort((a, b) => new Date(b.publishedAt || b.publishDate || 0) - new Date(a.publishedAt || a.publishDate || 0));

      elFeedMeta.textContent = data.feed?.title || 'The Koerner Office';
      elUpdated.textContent = `Last updated ${new Date(data.generatedAt).toLocaleString()}`;

      render(allEpisodes);
      elSearch.addEventListener('input', applyFilter);
    }

    init().catch((error) => {
      console.error(error);
      elFeedMeta.textContent = 'Failed to load TKO feed data';
      elEpisodes.innerHTML = '<article class="glass empty">Could not load podcast data. Re-run generator and refresh.</article>';
      elUpdated.textContent = 'Last updated unavailable';
    });
  </script>
</body>
</html>
